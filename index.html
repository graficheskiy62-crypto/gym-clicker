<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спортзал - Кликер</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://raw.githubusercontent.com/graficheskiy62-crypto/gym-clicker/main/gym_bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .emoji-box {
            font-size: 80px;
            margin: 10px 0;
            user-select: none;
            transition: transform 0.15s ease;
            cursor: default;
        }
        .emoji-box.pop { transform: scale(1.2); }
        .emoji-box:active { transform: scale(0.9); }

        #equipment-info {
            font-size: 16px;
            color: #bbb;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        #equip-name { font-weight: 600; color: #fff; font-size: 18px; }
        #equip-progress { background: #333; padding: 2px 8px; border-radius: 10px; font-size: 13px; }

        #strength-display {
            font-size: 28px;
            font-weight: bold;
            color: #944dff;
            margin: 10px 0;
        }
        #train-btn {
            background: #0022ff;
            color: #944dff;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }
        #train-btn:hover { background: #410699; }
        #train-btn:active { transform: scale(0.96); }
        
        .shop { 
            margin-top: 25px; 
            border-top: 1px solid rgba(255,255,255,0.15); 
            padding-top: 20px; 
        }
        .shop h2 { color: #ffffff; margin: 0 0 15px 0; font-size: 20px; }
        .shop-divider {
            border: 0;
            height: 1px;
            background: rgba(255,255,255,0.15);
            margin: 15px 0;
        }
        .shop h3 { color: #aaa; margin: 0 0 10px 0; font-size: 16px; font-weight: normal; }
        
        .shop-btn {
            border: none;
            padding: 12px 16px;
            font-size: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            margin-bottom: 10px;
            white-space: normal;
            word-break: break-word;
            line-height: 1.3;
        }
        #buy-btn { background: #6C63FF; color: white; }
        #buy-btn:hover:not(:disabled) { background: #5A52E0; }
        
        #change-equip-btn { background: #00b49a; color: #051b21; font-weight: bold; }
        #change-equip-btn:hover:not(:disabled) { background: #009d86; }
        
        .shop-btn:disabled { 
            background: #444; color: #888; cursor: not-allowed; opacity: 0.7; 
        }
        .shop-btn:active:not(:disabled) { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="container">
    <div id="main-emoji" class="emoji-box">🪨</div>
    <div id="equipment-info">
        <span id="equip-name">Гиря</span>
        <span id="equip-progress">1 / 12</span>
    </div>
    <div id="strength-display">Количество силы: 0</div>
    <button id="train-btn">Тренироваться</button>

    <div class="shop">
        <h2>Магазин улучшений</h2>
        <button id="buy-btn" class="shop-btn" disabled>НУЖНО 10</button>
        
        <hr class="shop-divider">
        <h3>Смена тренажера</h3>
        <button id="change-equip-btn" class="shop-btn" disabled>Заблокировано</button>
    </div>
</div>

<script>
    // ── Состояние игры ──
    let strength = 0;
    let silaClick = 1;
    let upgradeCost = 10;

    // ── 12 Тренажеров ──
    let equipIndex = 0;
    const equipmentList = [
        { emoji: '🪨', name: 'Гиря' },
        { emoji: '🏋️', name: 'Штанга' },
        { emoji: '🪢', name: 'Боевой канат' },
        { emoji: '🏋️‍♂️', name: 'Гантели' },
        { emoji: '🏃‍♂️', name: 'Беговая дорожка' },
        { emoji: '🚴', name: 'Велотренажер' },
        { emoji: '🤸‍♂️', name: 'Турник' },
        { emoji: '🧘', name: 'Коврик для йоги' },
        { emoji: '🏀', name: 'Фитбол' },
        { emoji: '🪜', name: 'Шведская стенка' },
        { emoji: '🥊', name: 'Боксёрская груша' },
        { emoji: '🏗️', name: 'Силовая рама' }
    ];
    let equipCost = 50;

    // ── Элементы DOM ──
    const strengthDisplay = document.getElementById('strength-display');
    const trainBtn = document.getElementById('train-btn');
    const buyBtn = document.getElementById('buy-btn');
    const changeEquipBtn = document.getElementById('change-equip-btn');
    const mainEmoji = document.getElementById('main-emoji');
    const equipName = document.getElementById('equip-name');
    const equipProgress = document.getElementById('equip-progress');

    // ── Обновление интерфейса ──
    function updateUI() {
        strengthDisplay.textContent = `Количество силы: ${strength}`;
        equipName.textContent = equipmentList[equipIndex].name;
        equipProgress.textContent = `${equipIndex + 1} / ${equipmentList.length}`;
        
        // Кнопка улучшения клика
        if (strength >= upgradeCost) {
            buyBtn.disabled = false;
            buyBtn.textContent = `УСИЛИТЬ КЛИК (${upgradeCost})`;
        } else {
            buyBtn.disabled = true;
            buyBtn.textContent = `НУЖНО ${upgradeCost}`;
        }

        // Кнопка смены тренажера
        const isMax = equipIndex >= equipmentList.length - 1;
        if (isMax) {
            changeEquipBtn.disabled = true;
            changeEquipBtn.textContent = "🏆 Все тренажеры открыты!";
            changeEquipBtn.style.background = "#2d6a4f";
            changeEquipBtn.style.color = "#fff";
        } else {
            const nextEquip = equipmentList[equipIndex + 1];
            if (strength >= equipCost) {
                changeEquipBtn.disabled = false;
                changeEquipBtn.textContent = `СМЕНИТЬ НА ${nextEquip.name} ${nextEquip.emoji} (${equipCost})`;
            } else {
                changeEquipBtn.disabled = true;
                changeEquipBtn.textContent = `НУЖНО ${equipCost} для ${nextEquip.name}`;
            }
        }
    }

    // ── Клик по тренировке ──
    trainBtn.addEventListener('click', () => {
        strength += silaClick;
        mainEmoji.classList.add('pop');
        setTimeout(() => mainEmoji.classList.remove('pop'), 100);
        updateUI();
    });

    // ── Покупка улучшения клика ──
    buyBtn.addEventListener('click', () => {
        if (strength >= upgradeCost) {
            strength -= upgradeCost;
            silaClick += 1;
            upgradeCost = Math.floor(upgradeCost * 1.5);
            updateUI();
        }
    });

    // ── Покупка смены тренажера ──
    changeEquipBtn.addEventListener('click', () => {
        const isMax = equipIndex >= equipmentList.length - 1;
        if (!isMax && strength >= equipCost) {
            strength -= equipCost;
            equipIndex++;
            const currentEquip = equipmentList[equipIndex];
            mainEmoji.textContent = currentEquip.emoji;
            equipCost = Math.floor(equipCost * 1.8);
            
            // Анимация смены
            mainEmoji.style.transition = "transform 0.3s ease";
            mainEmoji.style.transform = "scale(0) rotate(180deg)";
            setTimeout(() => {
                mainEmoji.style.transform = "scale(1) rotate(0deg)";
                setTimeout(() => mainEmoji.style.transition = "", 300);
            }, 150);
            
            updateUI();
        }
    });

    // Инициализация
    updateUI();
</script>

</body>
</html>
